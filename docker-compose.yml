services:
  # ========================
  # Go Fiber API
  # ========================
  api:
    build:
      context: ./fraud-api
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - APP_NAME=fraud-api
      - APP_PORT=3000
      - APP_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL_MODE=disable
      - JWT_SECRET=${JWT_SECRET}
      - BOT_API_KEY=${BOT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - LOG_OUTPUT=stdout
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL}
      - LINE_MESSAGING_CHANNEL_ID=${LINE_MESSAGING_CHANNEL_ID}
      - LINE_MESSAGING_CHANNEL_SECRET=${LINE_MESSAGING_CHANNEL_SECRET}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_RICH_MENU_FREE=${LINE_RICH_MENU_FREE}
      - LINE_RICH_MENU_MEMBER=${LINE_RICH_MENU_MEMBER}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - FACE_SERVICE_URL=http://face-service:3002
      - FACE_API_KEY=${FACE_API_KEY}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_REGION=${STORAGE_REGION}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL}
    volumes:
      - ./fraud-api:/app
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ========================
  # Redis (Session Store)
  # ========================
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================
  # PostgreSQL
  # ========================
  postgres:
    image: pgvector/pgvector:pg16
    # ports ไม่ expose — เข้าถึงได้แค่ใน Docker network
    # ถ้าต้อง debug จาก host: เปิด "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================
  # PgBouncer (Connection Pooler)
  # ========================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    # ports ไม่ expose — เข้าถึงได้แค่ใน Docker network
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=20
      - MAX_CLIENT_CONN=100
      - MAX_DB_CONNECTIONS=30
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================
  # Next.js Frontend
  # ========================
  web:
    build: ./fraud-web
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.xn--12cainl6g3mua5b.com/api/v1
      - NEXT_PUBLIC_LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - NEXT_PUBLIC_LIFF_ID=${LINE_LIFF_ID}
    restart: unless-stopped

  # ========================
  # Admin Panel (Vite + React)
  # ========================
  admin:
    build: ./fraud-admin
    ports:
      - "5173:5173"
    restart: unless-stopped

  # ========================
  # Face Service (Internal — ไม่ expose port)
  # ========================
  face-service:
    build: ./face-service
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      - FACE_API_KEY=${FACE_API_KEY}
      - FACE_CONFIDENCE_THRESHOLD=${FACE_CONFIDENCE_THRESHOLD}
      - FACE_MIN_SIZE=${FACE_MIN_SIZE}
      - USE_GPU=false
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
